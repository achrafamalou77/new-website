name: CI — Lint, Type-Check, Test & Build

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Stub env vars so build/test don't fail on missing credentials
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      OPENAI_API_KEY: placeholder-openai-key
      GEMINI_API_KEY: placeholder-gemini-key
      SENTRY_DSN: ""
      LOG_LEVEL: silent
      NODE_ENV: test

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Lint (ESLint)
        run: npm run lint
        continue-on-error: false

      - name: 🔷 Type-Check (TypeScript)
        run: npm run type-check
        continue-on-error: false

      - name: 🧪 Run Tests (Vitest)
        run: npm run test
        continue-on-error: false

      - name: 📊 Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: 🏗️ Production Build Validation
        run: npm run build
        env:
          # Use real secrets for the build step if available (optional)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder-key' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder-key' }}

      - name: ✅ CI Complete
        if: success()
        run: echo "All CI checks passed!"
